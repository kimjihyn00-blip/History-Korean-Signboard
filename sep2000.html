<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2000년대 간판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slide-container bg-2000 content-page">
        <div class="page-header">
            <h2 class="page-year">2000년대 간판</h2>
            <p class="page-concept">화려의 정점을 찍은 <span>00년대!</span></p>
        </div>

        <div class="gallery-grid">
            
            <div class="img-box-with-text">
                <div class="img-area">
                    <img src="2000_1.png" alt="진화한 네온사인 사진">
                </div>
                <p class="neon-pink-text">한층 진화한 네온사인 간판</p>
            </div>

            <div class="img-box grid-col-3">
                <img src="2000_2.png" alt="2000년대 게임방 골목">
            </div>
            
            <div class="img-box-with-text grid-col-2">
                <div class="img-area">
                    <img src="2000_3.png" alt="입체 모형 간판 사진">
                </div>
                <p class="model-purple-text">입체 모형이 들어간 간판</p>
            </div>
            
            <div class="img-box grid-col-2">
                <img src="2000_4.png" alt="2000년대 오렌지톤 간판">
            </div>
            
        </div>

        <div class="page-footer">
            <a href="index.html" class="back-to-home">▲ 표지로 돌아가기</a>
        </div>

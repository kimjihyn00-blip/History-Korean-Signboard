<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>1990년대 간판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slide-container bg-1990 content-page">
        <div class="page-header">
            <h2 class="page-year">1990년대 간판</h2>
            <p class="page-concept">인터넷과 포토샵의 보급으로 점차 화려해진 <span>90년대</span></p>
        </div>

        <div class="gallery-grid">
            
            <div class="img-box grid-col-2">
                <img src="1990_1.png" alt="세로 돌출형 안경/노래방">
            </div>
            
            <div class="img-box grid-col-2">
                <img src="1990_4.png" alt="90년대 도심 자동차와 거리">
            </div>
            
            <div class="img-box">
                <img src="1990_2.png" alt="야간 네온사인 빌딩">
            </div>
            
            <div class="img-box-with-text-side">
                <div class="side-img-area">
                    <img src="1990_6.png" alt="네온사인 대유행">
                </div>
                <div class="side-text-area">
                    <p class="neon-sub-text">77년~88년 오일쇼크 여파</p>
                    <p class="neon-main-text">금지 되었던<br>네온사인 대유행</p>
                </div>
            </div>
            
            <div class="img-box-with-text grid-col-2">
                <div class="img-area">
                    <img src="1990_5.png" alt="KFC 및 외국어 간판 거리">
                </div>
                <p class="kfc-text">외국어 글씨를 많이 사용</p>
            </div>
            
        </div>

        <div class="page-footer">
            <div></div> <a href="index.html" class="back-to-home">▲ 표지로 돌아가기</a>
        </div>
    </div>

</body>
</html>
